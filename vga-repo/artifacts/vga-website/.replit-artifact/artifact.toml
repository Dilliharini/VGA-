kind = "web"
previewPath = "/"
title = "Vallaba Ganapathy Associates"
version = "1.0.0"
id = "artifacts/vga-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26134

[services.development]
run = "pnpm --filter @workspace/vga-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vga-website", "run", "build" ]
publicDir = "artifacts/vga-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26134"
BASE_PATH = "/"
